# ERPNext on Coolify — Prashang Technologies / VrikshPath ERP
# Based on: https://github.com/frappe/frappe_docker
# Domain: erp.prashang.com | Server: 192.168.80.10

x-customizable-image: &customizable_image
  image: frappe/erpnext:version-15
  pull_policy: always

x-depends-on-configurator: &depends_on_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-backend-defaults: &backend_defaults
  <<: *depends_on_configurator
  <<: *customizable_image
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - logs:/home/frappe/frappe-bench/logs

services:

  # ── Database ────────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:10.6
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── Init: configure bench settings before any service starts ────────────────
  # Internal container addresses are hardcoded — only DB_PASSWORD is required from Coolify env
  configurator:
    <<: *customizable_image
    restart: "no"
    depends_on:
      mariadb:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -gy db_host mariadb;
        bench set-config -gp db_port 3306;
        bench set-config -gy redis_cache "redis://redis-cache:6379";
        bench set-config -gy redis_queue "redis://redis-queue:6379";
        bench set-config -gy redis_socketio "redis://redis-queue:6379";
        bench set-config -gp socketio_port 9000;
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  # ── ERPNext application services ─────────────────────────────────────────────
  backend:
    <<: *backend_defaults
    restart: unless-stopped

  frontend:
    <<: *customizable_image
    restart: unless-stopped
    depends_on:
      - backend
      - websocket
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: erp.prashang.com
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    expose:
      - "8080"

  websocket:
    <<: *depends_on_configurator
    <<: *customizable_image
    restart: unless-stopped
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  queue-short:
    <<: *backend_defaults
    restart: unless-stopped
    command: bench worker --num-workers 2 --queue short,default

  queue-long:
    <<: *backend_defaults
    restart: unless-stopped
    command: bench worker --num-workers 1 --queue long

  scheduler:
    <<: *backend_defaults
    restart: unless-stopped
    command: bench schedule

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data

volumes:
  mariadb-data:      # persistent — all ERPNext data lives here — NEVER delete
  sites:             # frappe site files, uploaded files, backups
  logs:
  redis-queue-data:
  redis-cache-data:
