# ERPNext on Coolify — Prashang Technologies / VrikshPath ERP
# Based on: https://github.com/frappe/frappe_docker
# Domain: erp.prashang.com | Server: 192.168.80.10

x-customizable-image: &customizable_image
  image: frappe/erpnext:version-15
  pull_policy: always

x-depends-on-configurator: &depends_on_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-backend-defaults: &backend_defaults
  <<: *depends_on_configurator
  <<: *customizable_image
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - logs:/home/frappe/frappe-bench/logs

services:

  # ── Database ────────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:10.6
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: _frappe_placeholder
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Init: configure bench settings before any service starts ────────────────
  configurator:
    <<: *customizable_image
    restart: "no"
    depends_on:
      mariadb:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -gy db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -gy redis_cache "redis://$$REDIS_CACHE";
        bench set-config -gy redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -gy redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port 9000;
    environment:
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      REDIS_CACHE: ${REDIS_CACHE:-redis-cache:6379}
      REDIS_QUEUE: ${REDIS_QUEUE:-redis-queue:6379}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  # ── ERPNext application services ─────────────────────────────────────────────
  backend:
    <<: *backend_defaults
    restart: unless-stopped

  frontend:
    <<: *customizable_image
    restart: unless-stopped
    depends_on:
      - backend
      - websocket
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-erp.prashang.com}
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    ports:
      - "8080:8080"

  websocket:
    <<: *depends_on_configurator
    <<: *customizable_image
    restart: unless-stopped
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  queue-short:
    <<: *backend_defaults
    restart: unless-stopped
    command: bench worker --num-workers 2 --queue short,default

  queue-long:
    <<: *backend_defaults
    restart: unless-stopped
    command: bench worker --num-workers 1 --queue long

  scheduler:
    <<: *backend_defaults
    restart: unless-stopped
    command: bench schedule

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data

volumes:
  mariadb-data:      # persistent — all ERPNext data lives here — NEVER delete
  sites:             # frappe site files, uploaded files, backups
  logs:
  redis-queue-data:
  redis-cache-data:
