# ERPNext on Coolify — Prashang Technologies / VrikshPath ERP
# Domain: erp.prashang.com | Server: 192.168.80.10

x-customizable-image: &customizable_image
  image: frappe/erpnext:version-15
  pull_policy: always

x-worker-defaults: &worker_defaults
  <<: *customizable_image
  restart: unless-stopped
  depends_on:
    backend:
      condition: service_started
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - logs:/home/frappe/frappe-bench/logs
  networks: [internal]

services:

  # ── Database ────────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:10.6
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks: [internal]

  # ── Backend ─────────────────────────────────────────────────────────────────
  # Writes bench config on first start, then serves on port 8000.
  # entrypoint: [bash, -c] bypasses docker-entrypoint.sh (same as upstream configurator).
  backend:
    <<: *customizable_image
    restart: unless-stopped
    entrypoint: [bash, -c]
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -gy db_host mariadb;
        bench set-config -gp db_port 3306;
        bench set-config -gy redis_cache "redis://redis-cache:6379";
        bench set-config -gy redis_queue "redis://redis-queue:6379";
        bench set-config -gy redis_socketio "redis://redis-queue:6379";
        bench set-config -gp socketio_port 9000;
        exec bench serve --port 8000
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    networks: [internal]

  # ── Frontend: nginx — routed by Traefik to erp.prashang.com ─────────────────
  frontend:
    <<: *customizable_image
    restart: unless-stopped
    depends_on:
      - backend
      - websocket
    command: [nginx-entrypoint.sh]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: erp.prashang.com
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    expose:
      - "8080"
    networks:
      - internal
      - coolify
    labels:
      traefik.enable: "true"
      traefik.http.routers.vrikshpath-erp.rule: "Host(`erp.prashang.com`)"
      traefik.http.routers.vrikshpath-erp.entrypoints: http
      traefik.http.services.vrikshpath-erp.loadbalancer.server.port: "8080"
      traefik.docker.network: coolify

  websocket:
    <<: *worker_defaults
    command: [node, /home/frappe/frappe-bench/apps/frappe/socketio.js]

  queue-short:
    <<: *worker_defaults
    command: bench worker --num-workers 2 --queue short,default

  queue-long:
    <<: *worker_defaults
    command: bench worker --num-workers 1 --queue long

  scheduler:
    <<: *worker_defaults
    command: bench schedule

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes: [redis-queue-data:/data]
    networks: [internal]

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes: [redis-cache-data:/data]
    networks: [internal]

networks:
  coolify:
    external: true   # Coolify's Traefik proxy network
  internal:
    internal: true   # No outbound internet; inter-service only

volumes:
  mariadb-data:      # persistent — NEVER delete
  sites:
  logs:
  redis-queue-data:
  redis-cache-data:
